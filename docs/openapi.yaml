openapi: 3.0.3
info:
  title: SpotDiggz Skate Spot Metadata API
  version: "0.2.0"
  description: |
    SpotDiggz API contract for skate spot metadata.
    The API stores and returns independent spot metadata for clients that render maps with Google Maps,
    MapKit, MapLibre, Leaflet, or another map UI.
servers:
  - url: http://localhost:8080
    description: Local development
paths:
  /sdz/health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /sdz/spots:
    get:
      summary: List skate spots
      parameters:
        - $ref: "#/components/parameters/BBox"
        - $ref: "#/components/parameters/Tags"
        - $ref: "#/components/parameters/Visibility"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Spot"
        "400":
          $ref: "#/components/responses/ErrorBadRequest"
    post:
      summary: Create a skate spot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSpotInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Spot"
        "400":
          $ref: "#/components/responses/ErrorBadRequest"
  /sdz/spots.geojson:
    get:
      summary: List skate spots as GeoJSON FeatureCollection
      parameters:
        - $ref: "#/components/parameters/BBox"
        - $ref: "#/components/parameters/Tags"
        - $ref: "#/components/parameters/Visibility"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeoJSONFeatureCollection"
        "400":
          $ref: "#/components/responses/ErrorBadRequest"
  /sdz/spots/{spotId}:
    parameters:
      - name: spotId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get a skate spot by ID
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Spot"
        "404":
          $ref: "#/components/responses/ErrorNotFound"
    patch:
      summary: Update a skate spot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSpotInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Spot"
        "400":
          $ref: "#/components/responses/ErrorBadRequest"
        "404":
          $ref: "#/components/responses/ErrorNotFound"
    delete:
      summary: Soft-delete a skate spot
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/ErrorNotFound"
components:
  parameters:
    BBox:
      name: bbox
      in: query
      required: false
      description: Bounding box in `minLng,minLat,maxLng,maxLat` order.
      schema:
        type: string
        example: "139.0,35.0,140.0,36.0"
    Tags:
      name: tags
      in: query
      required: false
      description: Comma-separated tags. All listed tags must match.
      schema:
        type: string
        example: "ledge,street"
    Visibility:
      name: visibility
      in: query
      required: false
      description: Visibility filter. Defaults to `public` in the current minimal implementation.
      schema:
        $ref: "#/components/schemas/Visibility"
  schemas:
    HealthResponse:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          example: healthy
        message:
          type: string
          example: spotdiggz metadata api is running
    Location:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
          format: double
          minimum: -90
          maximum: 90
          example: 35.6812
        lng:
          type: number
          format: double
          minimum: -180
          maximum: 180
          example: 139.7671
    Visibility:
      type: string
      enum: [public, private, unlisted]
      default: public
    Spot:
      type: object
      required:
        - spotId
        - name
        - location
        - tags
        - visibility
        - createdAt
        - updatedAt
      properties:
        spotId:
          type: string
          example: spot_4f7c0c7d4b7c6a8e2f001122
        name:
          type: string
          maxLength: 120
          example: Tokyo Demo Ledge
        description:
          type: string
          example: short ledge near the station
        location:
          $ref: "#/components/schemas/Location"
        tags:
          type: array
          items:
            type: string
          example: [ledge, street]
        visibility:
          $ref: "#/components/schemas/Visibility"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
    CreateSpotInput:
      type: object
      required: [name, location]
      properties:
        name:
          type: string
          maxLength: 120
        description:
          type: string
        location:
          $ref: "#/components/schemas/Location"
        tags:
          type: array
          items:
            type: string
        visibility:
          $ref: "#/components/schemas/Visibility"
    UpdateSpotInput:
      type: object
      properties:
        name:
          type: string
          maxLength: 120
        description:
          type: string
        location:
          $ref: "#/components/schemas/Location"
        tags:
          type: array
          items:
            type: string
        visibility:
          $ref: "#/components/schemas/Visibility"
    GeoJSONFeatureCollection:
      type: object
      required: [type, features]
      properties:
        type:
          type: string
          enum: [FeatureCollection]
        features:
          type: array
          items:
            $ref: "#/components/schemas/GeoJSONFeature"
    GeoJSONFeature:
      type: object
      required: [type, geometry, properties]
      properties:
        type:
          type: string
          enum: [Feature]
        geometry:
          type: object
          required: [type, coordinates]
          properties:
            type:
              type: string
              enum: [Point]
            coordinates:
              type: array
              minItems: 2
              maxItems: 2
              items:
                type: number
              description: "[lng, lat]"
        properties:
          type: object
          required: [spotId, name, tags, visibility, createdAt, updatedAt]
          properties:
            spotId:
              type: string
            name:
              type: string
            description:
              type: string
            tags:
              type: array
              items:
                type: string
            visibility:
              $ref: "#/components/schemas/Visibility"
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    ErrorResponse:
      type: object
      required: [code, errorCode, message]
      properties:
        code:
          type: integer
          format: int32
          example: 400
        errorCode:
          type: string
          example: SDZ-E-4001
        message:
          type: string
          example: name is required
  responses:
    ErrorBadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ErrorNotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
