name: spot-diggz CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feat/**"
      - "feature/**"
      - "chore/**"
      - "dependabot/**"
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

env:
  GO_VERSION: "1.25.10"
  NODE_VERSION: "22"

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  go-ci:
    name: Go API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Vet
        run: go vet ./cmd/... ./internal/...

      - name: Test
        run: go test ./cmd/... ./internal/...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan Go source
        run: govulncheck ./cmd/... ./internal/...

      - name: Build API binary
        run: go build -o bin/spotdiggz-api ./cmd/api

      - name: Scan Go binary
        run: govulncheck -mode=binary ./bin/spotdiggz-api

  browser-ci:
    name: Browser UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test -- --watch=false

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

  docker-ci:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: go-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: spotdiggz-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Trivy FS Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
